<h1>Экология</h1>

<p>Качество воды: <span id="water">78</span>%</p>
<p>AQI: <span id="aqi">42</span></p>
<p>Статус: <span id="status">Хороший</span></p>

<button onclick="updateEco()">Обновить</button>

<script>
function updateEco() {
    let aqi = Math.floor(Math.random() * 150);
    document.getElementById("aqi").innerText = aqi;

    if (aqi < 50) {
        document.getElementById("status").innerText = "Хороший";
    } else if (aqi < 100) {
        document.getElementById("status").innerText = "Средний";
    } else {
        document.getElementById("status").innerText = "Плохой";
    }

    document.getElementById("water").innerText = Math.floor(Math.random() * 100);
}
</script>
