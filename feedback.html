<h1>Заявления по районам Алматы</h1>

<div id="container"></div>

<script>
const districts = [
  "Алатауский район",
  "Алмалинский район",
  "Ауэзовский район",
  "Бостандыкский район",
  "Жетысуский район",
  "Медеуский район",
  "Наурызбайский район",
  "Турксибский район"
];

async function loadRequests() {
  const res = await fetch("http://localhost:3000/requests", {
    headers: { "Authorization": "admin123" }
  });

  const data = await res.json();
  const container = document.getElementById("container");

  container.innerHTML = "";

  districts.forEach(district => {
    const filtered = data.filter(r => r.district === district);

    const block = document.createElement("div");

    const title = document.createElement("h2");
    title.textContent = district + " — Заявлений: " + filtered.length;

    block.appendChild(title);

    if (filtered.length === 0) {
      const empty = document.createElement("p");
      empty.textContent = "Нет заявлений";
      block.appendChild(empty);
    }

    filtered.forEach(req => {
      const p = document.createElement("p");
      p.innerHTML = `
        <b>${req.name}</b><br>
        Тип: ${req.type}<br>
        ${req.message}<br>
        <small>${req.date}</small>
      `;
      block.appendChild(p);
    });

    container.appendChild(block);
  });
}

loadRequests();
</script>

</body>
</html>
