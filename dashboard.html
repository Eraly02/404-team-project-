<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Almaty Monitoring</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>
<body>

<div class="sidebar">
    <h2>Almaty Monitoring</h2>

    <a href="dashboard.html" class="active">Главная</a>
    <a href="ecology.html">Экология</a>
    <a href="transport.html">Транспорт</a>
    <a href="feedback.html">Обратная связь</a>
</div>

<div class="main">

    <div class="header big-header">
        <h1>Almaty Monitoring</h1>

        <div class="user">
            <div class="avatar"></div>
            <div>
                <div>Д.А.Сатыбалды</div>
                <small>Личный кабинет</small>
            </div>
        </div>
    </div>

    <div class="grid">

        <div class="card blue">
            <p>Индекс AQI</p>
            <div class="big">102</div>
        </div>

        <div class="card green">
            <p>Выбросы CO₂</p>
            <div class="big">860</div>
        </div>

        <div class="card orange">
            <p>Загруженность</p>
            <div class="big">70%</div>
        </div>

        <div class="card">
            <h3>Температура</h3>
            <canvas id="tempChart"></canvas>
        </div>

        <div class="card">
            <h3>Влажность</h3>
            <canvas id="humidityChart"></canvas>
        </div>

        <div class="card">
            <h3>Жалобы</h3>
            <canvas id="pieChart"></canvas>
        </div>

        <div class="card map">
            <h3>Новости</h3>

            <div class="news-item">
                <img src="images/bus.jpg">
                <div>
                    <p>Изменение маршрутов</p>
                    <a href="#">Читать</a>
                </div>
            </div>

            <div class="news-item">
                <img src="images/police.jpg">
                <div>
                    <p>Операция полиции</p>
                    <a href="#">Читать</a>
                </div>
            </div>

        </div>

    </div>
</div>


<div class="chat">
    <div id="chat"></div>
    <input id="input" placeholder="Введите текст..." onkeydown="if(event.key==='Enter')send()">
</div>

<script>
function send(){
    let input = document.getElementById("input");
    let chat = document.getElementById("chat");

    let msg = input.value;

    if(msg.trim() === "") return;

    chat.innerHTML += "<p><b>Вы:</b> " + msg + "</p>";

    let reply = "Данные обновлены 📊";
    chat.innerHTML += "<p><b>AI:</b> " + reply + "</p>";

    input.value = "";
}
</script>

<script>

new Chart(document.getElementById("tempChart"), {
    type: 'line',
    data: {
        labels: ["00","04","08","12","16","20"],
        datasets: [{
            data: [10,12,15,20,18,14],
            borderColor: "#6c63ff",
            fill: true
        }]
    }
});


new Chart(document.getElementById("humidityChart"), {
    type: 'line',
    data: {
        labels: ["00","04","08","12","16","20"],
        datasets: [{
            data: [60,55,50,45,65,70],
            borderColor: "#00c853",
            fill: true
        }]
    }
});

new Chart(document.getElementById("pieChart"), {
    type: 'doughnut',
    data: {
        labels: ["Ауэзовский","","Медеуский","Бостандыкский","Алмалинский","Жетысуский","Турксибский","Алатауский","Наурызбайский"],
        datasets: [{
            data: [15,14,8,9,14,10,18,12],
            backgroundColor: ["#4c47a3","#ff9800","#f44336","#9e9e9e"]
        }]
    }
});
</script>

</body>
</html>
